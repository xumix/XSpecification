version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-stack:
        patterns:
          - "NUnit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "FluentAssertions*"
          - "AutoFixture*"
          - "NSubstitute"
      analyzers:
        patterns:
          - "StyleCop.Analyzers"
          - "Roslynator.*"
          - "Microsoft.SourceLink.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
