name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore XSpecification.slnx

      - name: Build
        run: dotnet build XSpecification.slnx -c Release --no-restore

      - name: Test
        run: dotnet test XSpecification.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml

      - name: Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
        continue-on-error: true

  pack:
    name: Pack (preview)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack
        run: dotnet pack XSpecification.slnx -c Release -o ./artifacts --version-suffix "preview.${{ github.run_number }}"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-preview
          path: ./artifacts/*.*nupkg
